name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature you'd like.
      placeholder: "e.g. Show album art on the OLED"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why would this be useful?
      placeholder: "e.g. It would make the display look more complete"
    validations:
      required: false
