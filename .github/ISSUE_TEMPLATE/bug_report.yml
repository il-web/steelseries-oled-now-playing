name: Bug Report
description: Report a bug or issue
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "e.g. The OLED screen stops updating after a few minutes"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. The screen should keep updating"
    validations:
      required: true

  - type: dropdown
    id: keyboard
    attributes:
      label: Keyboard Model
      options:
        - Apex 5
        - Apex 7
        - Apex 7 TKL
        - Apex Pro
        - Apex Pro TKL
        - Apex Pro 2023
        - Apex Pro TKL 2023
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      placeholder: "e.g. Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste any errors from the console or from `now_playing.log`.
      render: text
    validations:
      required: false
